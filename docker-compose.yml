services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 3s
      retries: 10
  inventory-service:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: :8000
      GRPC_ADDR: :9000
      DATABASE_DSN: postgres://inventory:inventory@postgres:5432/inventory?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_BUCKET_COUNT: 16
      REDIS_BUCKET_LOCK_SIZE: 100
    ports:
      - "8000:8000"
      - "9000:9000"
